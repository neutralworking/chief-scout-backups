name: Supabase Backup
on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight
  workflow_dispatch:  # Manual trigger
jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # Or your default branch
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Backup roles
        run: supabase db dump --db-url "$SUPABASE_DB_URL" -f backups/roles.sql --role-only
      - name: Backup schema
        run: supabase db dump --db-url "$SUPABASE_DB_URL" -f backups/schema.sql
      - name: Backup data
        run: supabase db dump --db-url "$SUPABASE_DB_URL" -f backups/data.sql --data-only --use-copy
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Daily Supabase backup {{ github.event.head_commit.id }}'
          file_pattern: backups/*.sql
